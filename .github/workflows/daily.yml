name: daily-update
on:
  schedule:
    - cron: "30 15 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - run: python run_daily.py
      - name: Copy fresh data into docs
        run: |
          mkdir -p docs/data
          cp -r site/data/* docs/data/
      - name: Commit refreshed data
        run: |
          git config user.name "dugout-brain-bot"
          git config user.email "actions@github.com"
          git add data site/data docs/data
          git diff --cached --quiet || git commit -m "Daily update"
          git push
